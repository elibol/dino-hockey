<body>

<script>
// ═══════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════
const display = document.getElementById('c');
const dc = display.getContext('2d');
const game = document.createElement('canvas');
const G = game.getContext('2d');
const GW = 768, GH = 480;
game.width = GW; game.height = GH;

const isMobileDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
let mobileLandscape = false;
function resize() {
  mobileLandscape = isMobileDevice && window.innerWidth > window.innerHeight;
  const pad = mobileLandscape ? 10 : (isMobileDevice ? 140 : 60);
  const w = window.innerWidth, h = window.innerHeight;
  const s = Math.max(0.5, Math.min((w - 10) / GW, (h - pad) / GH));
  display.width = Math.round(GW * s);
  display.height = Math.round(GH * s);
  display.style.maxWidth = '100vw';
  dc.imageSmoothingEnabled = false;
}
resize();
addEventListener('resize', resize);
if (screen.orientation) screen.orientation.addEventListener('change', () => setTimeout(resize, 100));
addEventListener('orientationchange', () => setTimeout(resize, 100));

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let ac;
function initAudio() { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq, dur, type = 'square', vol = 0.07) {
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
function sfxHit() { beep(600, 0.04); }
function sfxShoot() { beep(900, 0.06); }
function sfxGoal() { beep(523, 0.15, 'square', 0.1); setTimeout(() => beep(659, 0.15, 'square', 0.1), 120); setTimeout(() => beep(784, 0.3, 'square', 0.12), 240); }
function sfxWhistle() { beep(880, 0.4, 'sine', 0.06); }
function sfxCheck() { beep(150, 0.08, 'sawtooth', 0.1); }
function sfxBirthday() { [523,523,587,523,698,659].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.08), i * 220)); }

// ═══════════════════════════════════════════════════════════
// 80s TV THEME SYNTH MUSIC
// ═══════════════════════════════════════════════════════════
let musicPlaying = false;
let musicNodes = [];
let musicLoopInterval = null;
const BPM = 140;
const BEAT = 60 / BPM;

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
  musicPlaying = false;
  if (musicLoopInterval) { clearInterval(musicLoopInterval); musicLoopInterval = null; }
}

function startMusic() {
  if (!ac || musicPlaying) return;
  musicPlaying = true;

  const master = ac.createGain();
  master.gain.value = 0.10;
  master.connect(ac.destination);

  const loopLen = BEAT * 32;

  function note(t, freq, dur, type, vol) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur - 0.01);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur);
    musicNodes.push(o);
  }

  // Kick with punch
  function kick(t) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(35, t + 0.1);
    g.gain.setValueAtTime(0.7, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.18);
    musicNodes.push(o);
  }

  // Snare (noise-ish)
  function snare(t) {
    [1200, 1800, 2400, 3600].forEach(f => {
      note(t, f + Math.random() * 400, 0.08, 'square', 0.06);
    });
    note(t, 200, 0.07, 'triangle', 0.15);
  }

  // Hat
  function hat(t, open) {
    note(t, 7000 + Math.random() * 3000, open ? 0.1 : 0.03, 'square', open ? 0.08 : 0.06);
  }

  // Synth stab (chord hit)
  function stab(t, freqs, dur) {
    freqs.forEach(f => note(t, f, dur, 'sawtooth', 0.08));
  }

  function scheduleLoop(startT) {
    const B = BEAT;
    // ── DRUMS: Kick on 1&3, snare on 2&4, hats on 8ths, open hat on & of 4 ──
    for (let i = 0; i < 32; i++) {
      const t = startT + i * B;
      if (i % 2 === 0) kick(t);
      if (i % 2 === 1) snare(t);
      hat(t, false);
      hat(t + B * 0.5, i % 4 === 3); // open hat on & of 4
    }

    // ── BASS: Bouncy octave-jumping synth bass (C major, very 80s TV) ──
    const bass = [
      // Bar 1-2 (C)
      [0, 131], [0.5, 262], [1, 131], [1.5, 0], [2, 131], [2.5, 262], [3, 175], [3.5, 196],
      // Bar 3-4 (F)
      [4, 175], [4.5, 349], [5, 175], [5.5, 0], [6, 175], [6.5, 349], [7, 196], [7.5, 220],
      // Bar 5-6 (G)
      [8, 196], [8.5, 392], [9, 196], [9.5, 0], [10, 196], [10.5, 392], [11, 220], [11.5, 262],
      // Bar 7-8 (C -> G turnaround)
      [12, 262], [12.5, 523], [13, 262], [13.5, 247], [14, 196], [14.5, 392], [15, 196], [15.5, 165],
      // Bar 9-12: same but busier
      [16, 131], [16.25, 196], [16.5, 262], [17, 131], [17.5, 262], [18, 131], [18.5, 262], [19, 196], [19.5, 220],
      [20, 175], [20.25, 220], [20.5, 349], [21, 175], [21.5, 349], [22, 175], [22.5, 262], [23, 220], [23.5, 196],
      // Bar 13-14 (Am -> G)
      [24, 220], [24.5, 440], [25, 220], [25.5, 262], [26, 196], [26.5, 392], [27, 196], [27.5, 165],
      // Bar 15-16 (F -> G -> C!)
      [28, 175], [28.5, 349], [29, 196], [29.5, 392], [30, 262], [30.5, 523], [31, 262], [31.5, 196],
    ];
    bass.forEach(([beat, f]) => {
      if (f > 0) note(startT + beat * B, f, B * 0.4, 'square', 0.25);
    });

    // ── LEAD: Catchy 80s TV hook (think Knight Rider / Miami Vice / A-Team) ──
    const lead = [
      // Phrase 1: bold opening riff
      [0, 523, 0.75], [0.75, 587, 0.25], [1, 659, 0.5], [1.5, 784, 0.5],
      [2, 880, 1.5], [3.5, 784, 0.5],
      // Phrase 2: answer
      [4, 698, 0.5], [4.5, 659, 0.5], [5, 523, 1], [6, 587, 0.75], [6.75, 523, 0.25], [7, 440, 1],
      // Phrase 3: build up
      [8, 523, 0.5], [8.5, 523, 0.25], [8.75, 587, 0.25], [9, 659, 0.5], [9.5, 784, 0.5],
      [10, 880, 0.5], [10.5, 988, 0.5], [11, 1047, 1],
      // Phrase 4: cool descending resolution
      [12, 988, 0.5], [12.5, 880, 0.5], [13, 784, 0.75], [13.75, 659, 0.25],
      [14, 587, 1], [15, 523, 0.5], [15.5, 587, 0.5],
      // Phrase 5: repeat hook up an octave feel
      [16, 659, 0.5], [16.5, 784, 0.5], [17, 880, 0.5], [17.5, 784, 0.5],
      [18, 659, 0.5], [18.5, 784, 0.5], [19, 880, 1],
      // Phrase 6: syncopated fun bit
      [20, 698, 0.25], [20.5, 784, 0.25], [21, 880, 0.5], [21.5, 784, 0.5],
      [22, 698, 0.5], [22.5, 659, 0.5], [23, 587, 1],
      // Phrase 7: triumphant climb
      [24, 440, 0.5], [24.5, 523, 0.5], [25, 587, 0.5], [25.5, 659, 0.5],
      [26, 784, 0.5], [26.5, 880, 0.5], [27, 988, 1],
      // Phrase 8: big finish
      [28, 1047, 1], [29, 988, 0.5], [29.5, 880, 0.5], [30, 784, 1.5], [31.5, 659, 0.5],
    ];
    lead.forEach(([beat, f, dur]) => {
      note(startT + beat * B, f, dur * B * 0.85, 'sawtooth', 0.14);
    });

    // ── CHORD STABS: Synth power chords on the & hits ──
    const chords = [
      [0.5, [523, 659, 784]], [2.5, [523, 659, 784]],
      [4.5, [349, 440, 523]], [6.5, [349, 440, 523]],
      [8.5, [392, 494, 587]], [10.5, [392, 494, 587]],
      [12.5, [523, 659, 784]], [14.5, [392, 494, 587]],
      [16.5, [523, 659, 784]], [18.5, [523, 659, 784]],
      [20.5, [349, 440, 523]], [22.5, [349, 440, 523]],
      [24.5, [440, 523, 659]], [26.5, [392, 494, 587]],
      [28.5, [349, 440, 523]], [30, [392, 494, 587]], [31, [523, 659, 784]],
    ];
    chords.forEach(([beat, freqs]) => {
      stab(startT + beat * B, freqs, B * 0.35);
    });

    // ── SPARKLE ARP: Fast triangle runs on transitions ──
    const sparkle = [262, 330, 392, 523, 659, 784, 1047];
    sparkle.forEach((f, i) => {
      note(startT + (15.5 + i * 0.07) * B, f, B * 0.15, 'triangle', 0.06);
      note(startT + (31.5 + i * 0.07) * B, f, B * 0.15, 'triangle', 0.06);
    });
  }

  scheduleLoop(ac.currentTime + 0.05);
  musicLoopInterval = setInterval(() => {
    if (!musicPlaying) { clearInterval(musicLoopInterval); musicLoopInterval = null; return; }
    musicNodes = musicNodes.filter(n => { try { n.playbackState; return true; } catch(e) { return false; } });
    scheduleLoop(ac.currentTime + 0.05);
  }, loopLen * 1000 - 200);
}

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const RINK = { x: 32, y: 58, w: 704, h: 390 };
const RCX = RINK.x + RINK.w / 2, RCY = RINK.y + RINK.h / 2;
const GOAL_W = 14, GOAL_H = 96;
const GOAL_L = { x: RINK.x - GOAL_W, y: RCY - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
const GOAL_R = { x: RINK.x + RINK.w, y: RCY - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
const FRICTION = 0.975;
const PUCK_FRICTION = 0.994;
const SHOT_SPEED = 6;
const WIN_SCORE = 5;
const PLAYER_ACCEL = 0.09;
const AI_ACCEL = 0.05;
const MAX_PLAYER_SPEED = 2.8;

const COL = {
  ice: '#daeaf4', iceDk: '#c8dce8',
  rinkBorder: '#3355aa', boardTop: '#556699',
  lineR: '#cc2222', lineB: '#2244aa',
  green: '#33aa44', greenDk: '#228833', greenLt: '#55cc66',
  red: '#cc3333', redDk: '#aa2222', redLt: '#ee5555',
  puck: '#111', wood: '#b08840',
  bg: '#080818', stands: '#161630',
};

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════
const keys = {}, jp = {};
addEventListener('keydown', e => {
  if (!keys[e.key]) jp[e.key] = true;
  keys[e.key] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  initAudio();
});
addEventListener('keyup', e => { keys[e.key] = false; });
function pressed(k) { if (jp[k]) { jp[k] = false; return true; } return false; }

// ═══════════════════════════════════════════════════════════
// MOBILE TOUCH CONTROLS
// ═══════════════════════════════════════════════════════════
const isMobile = isMobileDevice;
let dpadTouch = null;   // tracking touch ID for d-pad
let dpadDx = 0, dpadDy = 0; // normalized direction
const DPAD_R = 50;      // d-pad radius
let dpadCx = 0, dpadCy = 0; // d-pad center (set on resize)

function updateMobileLayout() {
  if (!isMobile) return;
  const r = display.getBoundingClientRect();
  dpadCx = r.left + 80;
  dpadCy = r.bottom + 70;
}

if (isMobile) {
  // Prevent scrolling/zooming
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  function getDpadDir(tx, ty) {
    const dx = tx - dpadCx, dy = ty - dpadCy;
    const d = Math.hypot(dx, dy);
    if (d < 12) return { x: 0, y: 0 };
    return { x: dx / d, y: dy / d };
  }

  function applyDpad(dir) {
    // Clear previous d-pad keys
    keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    keys['ArrowUp'] = false; keys['ArrowDown'] = false;
    // Apply based on direction thresholds
    if (dir.x < -0.3) keys['ArrowLeft'] = true;
    if (dir.x > 0.3) keys['ArrowRight'] = true;
    if (dir.y < -0.3) keys['ArrowUp'] = true;
    if (dir.y > 0.3) keys['ArrowDown'] = true;
  }

  display.addEventListener('touchstart', e => {
    initAudio();
    for (const t of e.changedTouches) {
      const tx = t.clientX, ty = t.clientY;
      const r = display.getBoundingClientRect();
      // Left half = d-pad, right half = action button
      if (tx < r.left + r.width / 2) {
        dpadTouch = t.identifier;
        // Re-center d-pad on where they put their thumb
        dpadCx = tx;
        dpadCy = ty;
        dpadDx = 0; dpadDy = 0;
      } else {
        // Action button = SPACE press
        jp[' '] = true; keys[' '] = true;
      }
    }
  }, { passive: false });

  display.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === dpadTouch) {
        const dir = getDpadDir(t.clientX, t.clientY);
        dpadDx = dir.x; dpadDy = dir.y;
        applyDpad(dir);
      }
    }
  }, { passive: false });

  function endTouch(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === dpadTouch) {
        dpadTouch = null; dpadDx = 0; dpadDy = 0;
        keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
        keys['ArrowUp'] = false; keys['ArrowDown'] = false;
      } else {
        keys[' '] = false;
      }
    }
  }
  display.addEventListener('touchend', endTouch);
  display.addEventListener('touchcancel', endTouch);

  // Also handle touches outside canvas for the d-pad area
  document.addEventListener('touchstart', e => {
    initAudio();
    for (const t of e.changedTouches) {
      if (e.target === display) return; // handled above
      const r = display.getBoundingClientRect();
      const tx = t.clientX, ty = t.clientY;
      if (tx < r.left + r.width / 2) {
        dpadTouch = t.identifier;
        dpadCx = tx; dpadCy = ty;
        dpadDx = 0; dpadDy = 0;
      } else {
        jp[' '] = true; keys[' '] = true;
      }
    }
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === dpadTouch) {
        const dir = getDpadDir(t.clientX, t.clientY);
        dpadDx = dir.x; dpadDy = dir.y;
        applyDpad(dir);
      }
    }
  }, { passive: false });
  document.addEventListener('touchend', endTouch);
  document.addEventListener('touchcancel', endTouch);
}

function drawMobileControls() {
  if (!isMobile) return;
  updateMobileLayout();
  const r = display.getBoundingClientRect();
  // Draw on a full-window overlay canvas
  const pad = 80;
  const ly = r.bottom + 15;

  // D-pad area (left side)
  const lx = r.left + pad;
  dc.save();
  // We need to draw in screen coords but dc is sized to display canvas
  // Instead draw below the game canvas using absolute positioned elements
  dc.restore();
}

// Create overlay for mobile controls
let mobileOverlay = null;
if (isMobile) {
  mobileOverlay = document.createElement('canvas');
  mobileOverlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:10';
  document.body.appendChild(mobileOverlay);

  function drawOverlay() {
    const oc = mobileOverlay.getContext('2d');
    mobileOverlay.width = window.innerWidth;
    mobileOverlay.height = window.innerHeight;
    const r = display.getBoundingClientRect();
    const land = mobileLandscape;

    // In landscape: controls overlay on game; in portrait: below game
    const defDpadCx = land ? r.left + 70 : r.left + 80;
    const defDpadCy = land ? r.bottom - 70 : r.bottom + 70;
    const cx = dpadTouch !== null ? dpadCx : defDpadCx;
    const cy = dpadTouch !== null ? dpadCy : defDpadCy;

    // Outer ring
    oc.beginPath();
    oc.arc(cx, cy, DPAD_R, 0, Math.PI * 2);
    oc.fillStyle = 'rgba(255,255,255,0.08)';
    oc.fill();
    oc.strokeStyle = 'rgba(255,255,255,0.25)';
    oc.lineWidth = 2;
    oc.stroke();

    // Inner nub (shows direction)
    const nx = cx + dpadDx * DPAD_R * 0.6;
    const ny = cy + dpadDy * DPAD_R * 0.6;
    oc.beginPath();
    oc.arc(nx, ny, 16, 0, Math.PI * 2);
    oc.fillStyle = 'rgba(255,255,255,0.2)';
    oc.fill();

    // Action button
    const bx = land ? r.right - 70 : r.right - 80;
    const by = land ? r.bottom - 70 : r.bottom + 70;
    oc.beginPath();
    oc.arc(bx, by, 36, 0, Math.PI * 2);
    oc.fillStyle = keys[' '] ? 'rgba(255,100,50,0.35)' : 'rgba(255,255,255,0.08)';
    oc.fill();
    oc.strokeStyle = 'rgba(255,255,255,0.25)';
    oc.lineWidth = 2;
    oc.stroke();

    // Button label
    oc.fillStyle = 'rgba(255,255,255,0.5)';
    oc.font = 'bold 11px monospace';
    oc.textAlign = 'center';
    oc.fillText('ACTION', bx, by + 4);

    // Hint text (only in portrait, skip in landscape to save space)
    if (!land) {
      oc.fillStyle = 'rgba(255,255,255,0.3)';
      oc.font = '9px monospace';
      oc.fillText('DRAG TO SKATE', cx, cy + DPAD_R + 18);
      oc.fillText('TAP: SHOOT/PASS', bx, by + 52);
      oc.fillText('x2: SLAP SHOT', bx, by + 64);
    }

    requestAnimationFrame(drawOverlay);
  }
  drawOverlay();
}

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
let state = 'TITLE', stateTimer = 0;
let score = [0, 0], clock = 0, period = 1;
let shakeX = 0, shakeY = 0, goalFlash = 0, lastGoalTeam = -1;
let goalScorerName = '';
let lastSpaceTime = 0;
let spaceQueued = false;
let spaceQueueDir = { x: 0, y: 0 };
const DOUBLE_TAP_MS = 200;
const particles = [];

const puck = { x: RCX, y: RCY, vx: 0, vy: 0, owner: null, lastShooter: '' };
const zelime = { x: RCX, y: RCY - 55, targetX: RCX, targetY: RCY - 55, armUp: 0 };

// ═══════════════════════════════════════════════════════════
// SPECIES & TEAMS
// ═══════════════════════════════════════════════════════════
const SPECIES = {
  trex:         { name: 'T-Rex',       speed: 2.0, size: 14, shotPow: 1.2 },
  raptor:       { name: 'Raptor',      speed: 2.8, size: 10, shotPow: 0.8 },
  pterodactyl:  { name: 'Pterodactyl', speed: 2.5, size: 12, shotPow: 0.9 },
  triceratops:  { name: 'Triceratops', speed: 1.6, size: 16, shotPow: 1.0 },
  ankylosaurus: { name: 'Ankylosaurus', speed: 1.2, size: 18, shotPow: 0.7 },
};

function makeTeam(team) {
  const dir = team === 0 ? 1 : -1;
  const gx = team === 0 ? RINK.x + 28 : RINK.x + RINK.w - 28;
  const dx = team === 0 ? RINK.x + 150 : RINK.x + RINK.w - 150;
  const cx = team === 0 ? RCX - 28 : RCX + 28;
  const wx = team === 0 ? RCX - 90 : RCX + 90;
  return [
    { role: 'Center',  dino: 'trex',         hx: cx, hy: RCY,       facing: dir, team },
    { role: 'Wing',    dino: 'raptor',        hx: wx, hy: RCY - 80,  facing: dir, team },
    { role: 'Defense', dino: 'triceratops',   hx: dx, hy: RCY,       facing: dir, team },
    { role: 'Goalie',  dino: 'ankylosaurus',  hx: gx, hy: RCY,       facing: dir, team },
  ].map(p => ({ ...p, x: p.hx, y: p.hy, vx: 0, vy: 0, sp: SPECIES[p.dino] }));
}

let teams = [makeTeam(0), makeTeam(1)];
let selIdx = 0;
function sel() { return teams[0][selIdx]; }

function resetPositions() {
  teams = [makeTeam(0), makeTeam(1)];
  puck.x = RCX; puck.y = RCY; puck.vx = 0; puck.vy = 0; puck.owner = null;
  selIdx = 0;
  zelime.x = RCX; zelime.y = RCY - 55; zelime.armUp = 0;
  particles.length = 0;
}

// ═══════════════════════════════════════════════════════════
// PARTICLES (ice spray)
// ═══════════════════════════════════════════════════════════
function spawnIce(x, y, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3,
      life: 0.5 + Math.random() * 0.3, size: 1 + Math.random() * 2,
      col: Math.random() > 0.5 ? '#dff' : '#bde',
    });
  }
}

const DINO_DRAW = { trex: drawTRex, raptor: drawRaptor, pterodactyl: drawPtero, triceratops: drawTriceratops, ankylosaurus: drawAnkylo };

function drawPlayer(p, isSel) {
  const c = p.team === 0 ? COL.green : COL.red;
  const dk = p.team === 0 ? COL.greenDk : COL.redDk;
  const lt = p.team === 0 ? COL.greenLt : COL.redLt;
  const px = Math.round(p.x), py = Math.round(p.y);

  // Shadow
  G.fillStyle = 'rgba(0,0,0,0.15)';
  G.beginPath(); G.ellipse(px, py + p.sp.size + 2, p.sp.size * 0.8, 4, 0, 0, Math.PI * 2); G.fill();

  // Team circle
  G.fillStyle = c + '35';
  G.beginPath(); G.arc(px, py, p.sp.size, 0, Math.PI * 2); G.fill();

  // ── SELECTION INDICATOR (very obvious) ──
  if (isSel) {
    const pulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
    const r = p.sp.size + 6 + Math.sin(Date.now() * 0.006) * 3;

    // Outer glow ring
    G.strokeStyle = 'rgba(255,240,50,' + (pulse * 0.3) + ')';
    G.lineWidth = 6;
    G.beginPath(); G.arc(px, py, r + 4, 0, Math.PI * 2); G.stroke();

    // Main selection ring (thick, bright)
    G.strokeStyle = '#ffe030';
    G.lineWidth = 3;
    G.beginPath(); G.arc(px, py, r, 0, Math.PI * 2); G.stroke();

    // Inner ring
    G.strokeStyle = '#fff';
    G.lineWidth = 1;
    G.beginPath(); G.arc(px, py, r - 3, 0, Math.PI * 2); G.stroke();

    // Bouncing chevron above player
    const chevronY = py - p.sp.size - 22 + Math.sin(Date.now() * 0.007) * 5;
    G.fillStyle = '#ffe030';
    G.beginPath();
    G.moveTo(px, chevronY + 6);
    G.lineTo(px - 6, chevronY);
    G.lineTo(px - 3, chevronY);
    G.lineTo(px, chevronY + 3);
    G.lineTo(px + 3, chevronY);
    G.lineTo(px + 6, chevronY);
    G.closePath();
    G.fill();

    // Second chevron (slightly above, fainter)
    G.fillStyle = 'rgba(255,240,50,0.4)';
    G.beginPath();
    G.moveTo(px, chevronY - 1);
    G.lineTo(px - 5, chevronY - 6);
    G.lineTo(px - 2, chevronY - 6);
    G.lineTo(px, chevronY - 4);
    G.lineTo(px + 2, chevronY - 6);
    G.lineTo(px + 5, chevronY - 6);
    G.closePath();
    G.fill();

    // Direction arrow (facing direction)
    G.fillStyle = '#ffe030';
    G.beginPath();
    G.moveTo(px + p.facing * (r + 8), py);
    G.lineTo(px + p.facing * (r + 2), py - 5);
    G.lineTo(px + p.facing * (r + 2), py + 5);
    G.fill();
  }

  // Hockey stick
  G.fillStyle = COL.wood;
  const sl = 16;
  G.fillRect(px + p.facing * 8, py + 5, p.facing * sl, 2);
  G.fillRect(px + p.facing * (8 + sl), py + 5, 2, 4);

  // Dino sprite
  DINO_DRAW[p.dino](p.x, p.y, p.facing, c, dk, lt);

  // Puck on stick
  if (puck.owner === p) {
    G.fillStyle = COL.puck;
    const pkx = px + p.facing * (10 + sl) - 2;
    G.fillRect(pkx, py + 7, 5, 5);
    G.fillStyle = '#333';
    G.fillRect(pkx + 1, py + 8, 3, 3);
  }

  // Name label when selected (larger, with background)
  if (isSel) {
    const label = p.sp.name + ' [' + p.role + ']';
    G.font = 'bold 11px monospace';
    const tw = G.measureText(label).width;
    G.fillStyle = 'rgba(0,0,0,0.6)';
    G.fillRect(px - tw / 2 - 3, py - p.sp.size - 40, tw + 6, 14);
    G.fillStyle = '#ffe030';
    G.textAlign = 'center';
    G.fillText(label, px, py - p.sp.size - 29);
  }
}

  G.fillRect(0, -17, 1, 1);

  // Gentle smile (soft pink, small)
  G.fillStyle = '#ff6699';
  G.fillRect(-1, -14, 2, 1);

  // Big hoop earrings (silver, dangling — 80s bling)
  G.fillStyle = '#c0c0c0';
  G.fillRect(-7, -18, 1, 5); G.fillRect(6, -18, 1, 5);
  G.fillRect(-7, -13, 3, 1); G.fillRect(5, -13, 3, 1);
  G.fillRect(-5, -18, 1, 5); G.fillRect(4, -18, 1, 5);
  // Earring sparkle
  G.fillStyle = '#fff';
  G.fillRect(-7, -17, 1, 1); G.fillRect(6, -16, 1, 1);
  G.fillRect(-5, -15, 1, 1); G.fillRect(4, -14, 1, 1);

  // Blush shimmer (80s glam)
  G.fillStyle = 'rgba(255,150,200,0.4)';
  G.fillRect(-5, -17, 2, 2); G.fillRect(3, -17, 2, 2);

  G.restore();

  // Name tag (outside scale transform)
  G.fillStyle = '#ffe030';
  G.font = 'bold ' + Math.round(10 * S) + 'px monospace';
  G.textAlign = 'center';
  G.fillText('ZELIME', px, py - Math.round(36 * S));
}

// ═══════════════════════════════════════════════════════════
// RINK
// ═══════════════════════════════════════════════════════════
function drawRink() {
  // Background / stands
  G.fillStyle = COL.bg; G.fillRect(0, 0, GW, GH);

  // Stands area
  const grad = G.createLinearGradient(0, 0, 0, RINK.y - 4);
  grad.addColorStop(0, '#0c0c28');
  grad.addColorStop(1, '#161640');
  G.fillStyle = grad;
  G.fillRect(0, 0, GW, RINK.y - 4);
  const gradB = G.createLinearGradient(0, RINK.y + RINK.h + 4, 0, GH);
  gradB.addColorStop(0, '#161640');
  gradB.addColorStop(1, '#0c0c28');
  G.fillStyle = gradB;
  G.fillRect(0, RINK.y + RINK.h + 4, GW, GH);

  // Crowd dots
  for (let i = 0; i < 80; i++) {
    const cx = (i * 47 + 13) % GW;
    const cy = i < 40 ? 10 + (i * 31 % (RINK.y - 20)) : RINK.y + RINK.h + 10 + ((i - 40) * 31 % (GH - RINK.y - RINK.h - 20));
    const hue = (i * 73) % 360;
    G.fillStyle = `hsl(${hue}, 60%, ${35 + Math.sin(Date.now() * 0.002 + i) * 5}%)`;
    G.fillRect(cx, cy, 3, 4);
    G.fillStyle = '#ffb088';
    G.fillRect(cx, cy - 2, 3, 2);
  }

  // Boards (3D-ish)
  G.fillStyle = '#334466';
  G.fillRect(RINK.x - 4, RINK.y - 4, RINK.w + 8, RINK.h + 8);
  G.fillStyle = '#445577';
  G.fillRect(RINK.x - 3, RINK.y - 3, RINK.w + 6, RINK.h + 6);

  // Ice surface with gradient
  const iceGrad = G.createRadialGradient(RCX, RCY, 50, RCX, RCY, RINK.w * 0.6);
  iceGrad.addColorStop(0, '#e8f4ff');
  iceGrad.addColorStop(1, COL.ice);
  G.fillStyle = iceGrad;
  G.fillRect(RINK.x, RINK.y, RINK.w, RINK.h);

  // Ice texture (subtle scratches)
  G.strokeStyle = 'rgba(180,210,230,0.15)';
  G.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const sx = RINK.x + (i * 137) % RINK.w;
    G.beginPath();
    G.moveTo(sx, RINK.y + (i * 71) % RINK.h);
    G.lineTo(sx + 30 + i * 3, RINK.y + ((i * 71) + 10) % RINK.h);
    G.stroke();
  }

  // Center red line
  G.fillStyle = COL.lineR;
  G.fillRect(RCX - 2, RINK.y, 4, RINK.h);
  G.fillStyle = '#ff4444';
  G.fillRect(RCX - 1, RINK.y, 2, RINK.h);

  // Blue lines
  const bL = RINK.x + RINK.w * 0.3, bR = RINK.x + RINK.w * 0.7;
  G.fillStyle = COL.lineB;
  G.fillRect(Math.round(bL) - 2, RINK.y, 4, RINK.h);
  G.fillRect(Math.round(bR) - 2, RINK.y, 4, RINK.h);
  G.fillStyle = '#3366cc';
  G.fillRect(Math.round(bL) - 1, RINK.y, 2, RINK.h);
  G.fillRect(Math.round(bR) - 1, RINK.y, 2, RINK.h);

  // Center circle
  G.strokeStyle = COL.lineR; G.lineWidth = 2;
  G.beginPath(); G.arc(RCX, RCY, 40, 0, Math.PI * 2); G.stroke();
  G.fillStyle = COL.lineR;
  G.beginPath(); G.arc(RCX, RCY, 4, 0, Math.PI * 2); G.fill();

  // Face-off spots
  [[RINK.x + 120, RCY - 80], [RINK.x + 120, RCY + 80],
   [RINK.x + RINK.w - 120, RCY - 80], [RINK.x + RINK.w - 120, RCY + 80]].forEach(([fx, fy]) => {
    G.fillStyle = COL.lineR;
    G.beginPath(); G.arc(fx, fy, 4, 0, Math.PI * 2); G.fill();
    G.strokeStyle = COL.lineR; G.lineWidth = 1.5;
    G.beginPath(); G.arc(fx, fy, 24, 0, Math.PI * 2); G.stroke();
  });

  // Goal creases
  G.fillStyle = 'rgba(150,190,220,0.5)';
  G.fillRect(RINK.x, RCY - GOAL_H / 2 - 10, 28, GOAL_H + 20);
  G.fillRect(RINK.x + RINK.w - 28, RCY - GOAL_H / 2 - 10, 28, GOAL_H + 20);
  G.strokeStyle = COL.lineR; G.lineWidth = 1;
  G.strokeRect(RINK.x, RCY - GOAL_H / 2 - 10, 28, GOAL_H + 20);
  G.strokeRect(RINK.x + RINK.w - 28, RCY - GOAL_H / 2 - 10, 28, GOAL_H + 20);

  // Goal lines
  G.fillStyle = COL.lineR;
  G.fillRect(RINK.x, RINK.y, 2, RINK.h);
  G.fillRect(RINK.x + RINK.w - 2, RINK.y, 2, RINK.h);

  // Goals (nets)
  G.fillStyle = '#777';
  G.fillRect(GOAL_L.x, GOAL_L.y, GOAL_L.w, GOAL_L.h);
  G.fillRect(GOAL_R.x, GOAL_R.y, GOAL_R.w, GOAL_R.h);
  G.strokeStyle = '#999'; G.lineWidth = 1;
  for (let ny = GOAL_L.y; ny < GOAL_L.y + GOAL_L.h; ny += 6) {
    G.beginPath(); G.moveTo(GOAL_L.x, ny); G.lineTo(GOAL_L.x + GOAL_L.w, ny); G.stroke();
    G.beginPath(); G.moveTo(GOAL_R.x, ny); G.lineTo(GOAL_R.x + GOAL_R.w, ny); G.stroke();
  }
  for (let nx = 0; nx < GOAL_W; nx += 4) {
    G.beginPath(); G.moveTo(GOAL_L.x + nx, GOAL_L.y); G.lineTo(GOAL_L.x + nx, GOAL_L.y + GOAL_L.h); G.stroke();
    G.beginPath(); G.moveTo(GOAL_R.x + nx, GOAL_R.y); G.lineTo(GOAL_R.x + nx, GOAL_R.y + GOAL_R.h); G.stroke();
  }

  // Goal posts
  G.fillStyle = '#cc2222';
  G.fillRect(RINK.x - 2, RCY - GOAL_H / 2 - 2, 4, 4);
  G.fillRect(RINK.x - 2, RCY + GOAL_H / 2 - 2, 4, 4);
  G.fillRect(RINK.x + RINK.w - 2, RCY - GOAL_H / 2 - 2, 4, 4);
  G.fillRect(RINK.x + RINK.w - 2, RCY + GOAL_H / 2 - 2, 4, 4);

  // Board highlight
  G.strokeStyle = COL.rinkBorder; G.lineWidth = 3;
  G.strokeRect(RINK.x - 1, RINK.y - 1, RINK.w + 2, RINK.h + 2);
}

function drawPuckFree() {
  if (puck.owner) return;
  const px = Math.round(puck.x), py = Math.round(puck.y);
  // Shadow
  G.fillStyle = 'rgba(0,0,0,0.2)';

// ═══════════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════════
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function updatePuck() {
  if (puck.owner) {
    puck.x = puck.owner.x + puck.owner.facing * 26;
    puck.y = puck.owner.y + 9;
    puck.vx = puck.owner.vx;
    puck.vy = puck.owner.vy;
    return;
  }

  puck.x += puck.vx; puck.y += puck.vy;
  puck.vx *= PUCK_FRICTION; puck.vy *= PUCK_FRICTION;

  if (puck.y < RINK.y + 4) { puck.y = RINK.y + 4; puck.vy *= -0.8; sfxHit(); }
  if (puck.y > RINK.y + RINK.h - 4) { puck.y = RINK.y + RINK.h - 4; puck.vy *= -0.8; sfxHit(); }

  if (puck.x < RINK.x + 2 && (puck.y < GOAL_L.y || puck.y > GOAL_L.y + GOAL_L.h)) {
    puck.x = RINK.x + 2; puck.vx *= -0.8; sfxHit();
  }
  if (puck.x > RINK.x + RINK.w - 2 && (puck.y < GOAL_R.y || puck.y > GOAL_R.y + GOAL_R.h)) {
    puck.x = RINK.x + RINK.w - 2; puck.vx *= -0.8; sfxHit();
  }

  if (puck.x <= GOAL_L.x + GOAL_L.w && puck.y > GOAL_L.y && puck.y < GOAL_L.y + GOAL_L.h) goalScored(1);
  if (puck.x >= GOAL_R.x && puck.y > GOAL_R.y && puck.y < GOAL_R.y + GOAL_R.h) goalScored(0);

  teams.flat().forEach(p => {
    if (!puck.owner && dist(p, puck) < p.sp.size + 5) {
      puck.owner = p; sfxHit();
      // Auto-select teammate who picks up puck
      if (p.team === 0) {
        const idx = teams[0].indexOf(p);
        if (idx >= 0) selIdx = idx;
      }
    }
  });
}

function goalScored(teamIdx) {
  score[teamIdx]++;
  lastGoalTeam = teamIdx;
  goalFlash = 50;
  goalScorerName = puck.lastShooter || '';
  state = 'GOAL'; stateTimer = 0;
  zelime.armUp = 1;
  sfxGoal();
  shakeX = 6; shakeY = 6;
  if (score[teamIdx] >= WIN_SCORE) { state = 'WIN'; stateTimer = 0; }
}

function shoot(p, dirX, dirY) {
  if (puck.owner !== p) return;
  puck.owner = null;
  puck.lastShooter = p.sp.name;
  let dx, dy;
  if (dirX || dirY) {
    // Directional shot (Atari-style: hold direction + fire)
    dx = dirX || 0; dy = dirY || 0;
  } else {
    // Default: toward opponent goal
    const tx = p.team === 0 ? RINK.x + RINK.w + 10 : RINK.x - 10;
    const ty = RCY + (Math.random() - 0.5) * GOAL_H * 0.7;
    dx = tx - p.x; dy = ty - p.y;
  }
  const d = Math.hypot(dx, dy) || 1;
  const pow = SHOT_SPEED * p.sp.shotPow;
  puck.vx = (dx / d) * pow + p.vx * 0.3;
  puck.vy = (dy / d) * pow + p.vy * 0.3;
  spawnIce(p.x + p.facing * 20, p.y + 5, 6);
  sfxShoot();
}

function slapShot(p, dirX, dirY) {
  if (puck.owner !== p) return;
  puck.owner = null;
  puck.lastShooter = p.sp.name;
  let dx, dy;
  if (dirX || dirY) {
    dx = dirX || 0; dy = dirY || 0;
  } else {
    const tx = p.team === 0 ? RINK.x + RINK.w + 10 : RINK.x - 10;
    const ty = RCY + (Math.random() - 0.5) * GOAL_H * 0.5;
    dx = tx - p.x; dy = ty - p.y;
  }
  const d = Math.hypot(dx, dy) || 1;
  const pow = SHOT_SPEED * p.sp.shotPow * 1.8;
  puck.vx = (dx / d) * pow + p.vx * 0.4;
  puck.vy = (dy / d) * pow + p.vy * 0.4;
  spawnIce(p.x + p.facing * 20, p.y + 5, 20);
  spawnIce(p.x, p.y + 10, 10);
  shakeX = 8; shakeY = 8;
  goalFlash = 8;
  // Big slap shot sound (lower + louder)
  beep(200, 0.12, 'sawtooth', 0.15);
  beep(900, 0.08, 'square', 0.1);
}

function pass(p) {
  if (puck.owner !== p) return;
  const mates = teams[p.team].filter(t => t !== p);
  if (!mates.length) return;
  const target = mates.sort((a, b) => dist(a, p) - dist(b, p))[0];
  puck.owner = null;
  puck.lastShooter = p.sp.name;
  const dx = target.x - p.x, dy = target.y - p.y;
  const d = Math.hypot(dx, dy) || 1;
  puck.vx = (dx / d) * SHOT_SPEED * 0.65;
  puck.vy = (dy / d) * SHOT_SPEED * 0.65;
  sfxHit();
}

function bodyCheck(checker, target) {
  if (puck.owner !== target) return;
  puck.owner = null;
  puck.vx = (target.x - checker.x) * 0.1;
  puck.vy = (target.y - checker.y) * 0.1;
  target.vx += (target.x - checker.x) * 0.15;
  target.vy += (target.y - checker.y) * 0.15;
  spawnIce((checker.x + target.x) / 2, (checker.y + target.y) / 2, 10);
  sfxCheck();
  shakeX = 3; shakeY = 3;
}

function moveToward(p, tx, ty, mult) {
  const dx = tx - p.x, dy = ty - p.y, d = Math.hypot(dx, dy);
  if (d > 2) {
    p.vx += (dx / d) * p.sp.speed * (mult || AI_ACCEL);
    p.vy += (dy / d) * p.sp.speed * (mult || AI_ACCEL);
    p.facing = dx > 0 ? 1 : -1;
  }
}

function constrainRink(p) {
  p.x = clamp(p.x, RINK.x + 5, RINK.x + RINK.w - 5);
  p.y = clamp(p.y, RINK.y + 5, RINK.y + RINK.h - 5);
}

// ═══════════════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════════════
function runAI(team, skipIdx) {
  team.forEach((p, i) => {
    if (i === skipIdx) return;
    const hasPuck = puck.owner === p;
    const teamHas = team.some(t => puck.owner === t);
    const goalTgt = p.team === 0 ? { x: RINK.x + RINK.w - 20, y: RCY } : { x: RINK.x + 20, y: RCY };

    if (p.role === 'Goalie') {
      const gx = p.team === 0 ? RINK.x + 28 : RINK.x + RINK.w - 28;
      moveToward(p, gx, clamp(puck.y, RCY - GOAL_H / 2 + 8, RCY + GOAL_H / 2 - 8));
      if (hasPuck) shoot(p);
      return;
    }

    if (hasPuck) {
      if (Math.abs(goalTgt.x - p.x) < 170 + Math.random() * 60) shoot(p);
      else moveToward(p, goalTgt.x, goalTgt.y + (Math.random() - 0.5) * 80);
    } else if (!puck.owner) {
      const closest = team.filter(t => t.role !== 'Goalie').sort((a, b) => dist(a, puck) - dist(b, puck))[0];
      if (p === closest) moveToward(p, puck.x, puck.y);
      else moveToward(p, p.hx + (puck.x - p.hx) * 0.2, p.hy + (puck.y - p.hy) * 0.2);
    } else if (teamHas) {
      const off = p.team === 0 ? 70 : -70;
      moveToward(p, p.hx + off, p.hy);
    } else {
      const def = p.team === 0 ? -50 : 50;
      const chase = p.role === 'Defense' ? 0.15 : 0.35;
      moveToward(p, p.hx + def + (puck.x - p.hx) * chase, p.hy + (puck.y - p.hy) * chase);
      if (puck.owner && dist(p, puck.owner) < p.sp.size + puck.owner.sp.size + 18) bodyCheck(p, puck.owner);
    }
  });
}

function updateZelime() {
  zelime.targetX = puck.x + (puck.x < RCX ? 40 : -40);
  zelime.targetY = clamp(puck.y - 50, RINK.y + 20, RINK.y + RINK.h - 30);
  zelime.x += (zelime.targetX - zelime.x) * 0.015;
  zelime.y += (zelime.targetY - zelime.y) * 0.015;
  zelime.x = clamp(zelime.x, RINK.x + 20, RINK.x + RINK.w - 20);
  zelime.y = clamp(zelime.y, RINK.y + 15, RINK.y + RINK.h - 30);
  if (zelime.armUp > 0) zelime.armUp = Math.max(0, zelime.armUp - 0.008);
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════
function update() {
  shakeX *= 0.85; shakeY *= 0.85;
  goalFlash = Math.max(0, goalFlash - 1);
  stateTimer++;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (state === 'TITLE') {
    if (musicPlaying) stopMusic();
    if (pressed(' ')) {
      state = 'FACEOFF'; stateTimer = 0;
      score = [0, 0]; period = 1; clock = 0;
      resetPositions(); sfxWhistle(); sfxBirthday();
      startMusic();
    }
    return;
  }
  if (state === 'FACEOFF') {
    updateZelime();
    if (stateTimer > 150) { state = 'PLAY'; stateTimer = 0; }
    return;
  }
  if (state === 'GOAL') {
    updateZelime();
    if (stateTimer > 140) {
      if (score[0] >= WIN_SCORE || score[1] >= WIN_SCORE) { state = 'WIN'; stateTimer = 0; stopMusic(); }
      else { state = 'FACEOFF'; stateTimer = 0; resetPositions(); sfxWhistle(); }
    }
    return;
  }
  if (state === 'WIN') {
    if (pressed(' ')) { state = 'TITLE'; stateTimer = 0; }
    return;
  }

  // ── PLAY ──
  clock++;
  updateZelime();

  const s = sel();
  let px = 0, py = 0;
  if (keys['ArrowLeft'] || keys['a']) px--;
  if (keys['ArrowRight'] || keys['d']) px++;
  if (keys['ArrowUp'] || keys['w']) py--;
  if (keys['ArrowDown'] || keys['s']) py++;
  if (px || py) {
    const d = Math.hypot(px, py);
    s.vx += (px / d) * s.sp.speed * PLAYER_ACCEL;
    s.vy += (py / d) * s.sp.speed * PLAYER_ACCEL;
    s.facing = px > 0 ? 1 : (px < 0 ? -1 : s.facing);
    if (Math.abs(s.vx) + Math.abs(s.vy) > 2 && Math.random() > 0.7) spawnIce(s.x, s.y + 8, 1);
  }

  // Atari-style: one button (SPACE) does everything contextually
  // Double-tap SPACE = slap shot (first tap queues, second tap upgrades to slap)
  if (pressed(' ')) {
    const now = Date.now();
    let sx = 0, sy = 0;
    if (keys['ArrowLeft'] || keys['a']) sx--;
    if (keys['ArrowRight'] || keys['d']) sx++;
    if (keys['ArrowUp'] || keys['w']) sy--;
    if (keys['ArrowDown'] || keys['s']) sy++;
    // On mobile, use joystick direction for aiming if no keyboard arrows
    if (!sx && !sy && isMobile && (Math.abs(dpadDx) > 0.2 || Math.abs(dpadDy) > 0.2)) {
      sx = dpadDx; sy = dpadDy;
    }

    if (puck.owner === s) {
      if (spaceQueued && (now - lastSpaceTime) < DOUBLE_TAP_MS) {
        // Double-tap: slap shot!
        slapShot(s, sx || spaceQueueDir.x, sy || spaceQueueDir.y);
        spaceQueued = false;
      } else {
        // First tap: queue it, wait for possible second tap
        spaceQueued = true;
        spaceQueueDir = { x: sx, y: sy };
        lastSpaceTime = now;
      }
    } else {
      spaceQueued = false;
      const opp = teams[1].filter(p => dist(p, s) < s.sp.size + p.sp.size + 24)
        .sort((a, b) => dist(a, s) - dist(b, s))[0];
      if (opp && puck.owner === opp) bodyCheck(s, opp);
    }
  }
  // Execute queued single-tap after the double-tap window expires
  if (spaceQueued && (Date.now() - lastSpaceTime) >= DOUBLE_TAP_MS) {
    spaceQueued = false;
    if (puck.owner === s) {
      if (spaceQueueDir.x || spaceQueueDir.y) {
        shoot(s, spaceQueueDir.x, spaceQueueDir.y);
      } else {
        pass(s);
      }
    }
  }

  if (pressed('z') || pressed('Z')) {
    let best = -1, bestD = Infinity;
    teams[0].forEach((p, i) => {
      if (i === selIdx || p.role === 'Goalie') return;
      const d = dist(p, puck);
      if (d < bestD) { bestD = d; best = i; }
    });
    if (best >= 0) selIdx = best;
  }

  const allPlayers = teams.flat();
  allPlayers.forEach(p => {
    // Cap velocity
    const spd = Math.hypot(p.vx, p.vy);
    if (spd > MAX_PLAYER_SPEED) {
      p.vx = (p.vx / spd) * MAX_PLAYER_SPEED;
      p.vy = (p.vy / spd) * MAX_PLAYER_SPEED;
    }
    p.x += p.vx; p.y += p.vy;
    p.vx *= FRICTION; p.vy *= FRICTION;
    constrainRink(p);
  });
  // Player-player collision (push apart)
  for (let i = 0; i < allPlayers.length; i++) {
    for (let j = i + 1; j < allPlayers.length; j++) {
      const a = allPlayers[i], b = allPlayers[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const minD = a.sp.size + b.sp.size;
      if (d < minD && d > 0.1) {
        const overlap = (minD - d) / 2;
        const nx = dx / d, ny = dy / d;
        a.x -= nx * overlap; a.y -= ny * overlap;
        b.x += nx * overlap; b.y += ny * overlap;
        // Bounce velocities slightly
        const relV = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
        if (relV > 0) {
          a.vx -= nx * relV * 0.4; a.vy -= ny * relV * 0.4;
          b.vx += nx * relV * 0.4; b.vy += ny * relV * 0.4;
        }
      }
    }
  }

  // Auto-steal: selected player bumping into puck carrier takes it
  const s2 = sel();
  if (puck.owner && puck.owner.team === 1 && dist(s2, puck.owner) < s2.sp.size + puck.owner.sp.size + 8) {
    bodyCheck(s2, puck.owner);
  }

  runAI(teams[0], selIdx);
  runAI(teams[1], -1);
  updatePuck();

  for (const k in jp) jp[k] = false;
}

// ═══════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════
function draw() {
  G.clearRect(0, 0, GW, GH);
  drawRink();

  const playing = state === 'PLAY' || state === 'GOAL' || state === 'FACEOFF';

  if (playing) {
    // Particles (under players)
    particles.forEach(p => {
      G.fillStyle = p.col;
      G.globalAlpha = p.life;
      G.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    });
    G.globalAlpha = 1;

    const all = teams.flat().slice().sort((a, b) => a.y - b.y);
    let zelimeDrawn = false;
    all.forEach(p => {
      if (!zelimeDrawn && zelime.y < p.y) {
        drawZelime(zelime.x, zelime.y, zelime.armUp);
        zelimeDrawn = true;
      }
      drawPlayer(p, p === sel());
    });
    if (!zelimeDrawn) drawZelime(zelime.x, zelime.y, zelime.armUp);

    drawPuckFree();
  }

  if (state === 'FACEOFF') {
    const count = 3 - Math.floor(stateTimer / 40);
    G.textAlign = 'center';
    if (count > 0) {
      G.fillStyle = '#ffe030'; G.font = 'bold 40px monospace';
      G.fillText(count.toString(), RCX, RCY - 50);
    } else {
      G.fillStyle = '#44ff44'; G.font = 'bold 28px monospace';
      G.fillText('GO!', RCX, RCY - 50);
    }
  }

  if (goalFlash > 0) {
    G.fillStyle = 'rgba(255,255,200,' + (goalFlash / 100) + ')';
    G.fillRect(0, 0, GW, GH);
  }
  if (state === 'GOAL') {
    const bounce = Math.sin(stateTimer * 0.12) * 5;
    G.textAlign = 'center';
    G.fillStyle = '#000'; G.font = 'bold 42px monospace';
    G.fillText('GOAL!', RCX + 2, RCY - 18 + bounce + 2);
    G.fillStyle = '#ffe030'; G.font = 'bold 42px monospace';
    G.fillText('GOAL!', RCX, RCY - 18 + bounce);
    G.fillStyle = lastGoalTeam === 0 ? COL.green : COL.red;
    G.font = 'bold 16px monospace';
    G.fillText((lastGoalTeam === 0 ? 'GREEN' : 'RED') + ' DINOS SCORE!', RCX, RCY + 12);
    if (goalScorerName) {
      G.fillStyle = '#ddd'; G.font = '12px monospace';
      G.fillText('Scored by: ' + goalScorerName, RCX, RCY + 30);
    }
    G.fillStyle = '#ff88cc'; G.font = '10px monospace';
    G.fillText('Ref Zelime signals GOAL!', RCX, RINK.y + RINK.h + 14);
  }

  drawHUD();

  // ═══ TITLE SCREEN ═══
  if (state === 'TITLE') {
    G.fillStyle = 'rgba(5,5,20,0.9)';
    G.fillRect(0, 0, GW, GH);

    G.textAlign = 'center';
    // Title
    G.fillStyle = '#000';
    G.font = 'bold 44px monospace';
    G.fillText('DINO HOCKEY', RCX + 2, 72);
    G.fillStyle = '#ff22ee';
    G.fillText('DINO HOCKEY', RCX, 70);

    G.fillStyle = '#ffe030'; G.font = 'bold 14px monospace';
    G.fillText("ZELIME'S 50th BIRTHDAY EDITION!", RCX, 96);

    // Zelime on title screen
    drawZelime(RCX - 160, 148, 0.5 + Math.sin(Date.now() * 0.003) * 0.3, 1.4);

    // Dino lineup - Green team
    G.fillStyle = '#ccc'; G.font = 'bold 11px monospace'; G.textAlign = 'center';
    G.fillText('GREEN DINOS (YOU)', RCX, 200);
    const dinoInfo = [
      ['trex', 'T-Rex', 'Center'],
      ['raptor', 'Raptor', 'Wing'],
      ['triceratops', 'Trike', 'Defense'],
      ['ankylosaurus', 'Ankylo', 'Goalie'],
    ];
    dinoInfo.forEach(([dino, name, role], i) => {
      const dx = RCX - 120 + i * 80;
      DINO_DRAW[dino](dx, 222, 1, COL.green, COL.greenDk, COL.greenLt);
      G.fillStyle = '#bbb'; G.font = '8px monospace'; G.textAlign = 'center';
      G.fillText(name, dx, 240);
      G.fillStyle = '#888'; G.font = '7px monospace';
      G.fillText(role, dx, 250);
    });

    // VS
    G.fillStyle = '#888'; G.font = 'bold 12px monospace'; G.textAlign = 'center';
    G.fillText('VS', RCX, 268);

    // Red team
    G.fillStyle = '#ccc'; G.font = 'bold 11px monospace';
    G.fillText('RED DINOS', RCX, 282);
    dinoInfo.forEach(([dino], i) => {
      const dx = RCX - 120 + i * 80;
      DINO_DRAW[dino](dx, 300, -1, COL.red, COL.redDk, COL.redLt);
    });

    // ── CONTROLS ──
    const ctrlY = 335;
    G.fillStyle = 'rgba(10,10,30,0.7)';
    G.fillRect(RCX - 220, ctrlY - 10, 440, isMobile ? 78 : 92);
    G.strokeStyle = '#334'; G.lineWidth = 1;
    G.strokeRect(RCX - 220, ctrlY - 10, 440, isMobile ? 78 : 92);

    G.fillStyle = '#aab'; G.font = 'bold 10px monospace'; G.textAlign = 'center';
    G.fillText('- CONTROLS -', RCX, ctrlY + 2);

    G.font = '9px monospace'; G.textAlign = 'left';
    const cx = RCX - 200;
    if (isMobile) {
      G.fillStyle = '#ffe030'; G.fillText('DRAG (left side)', cx, ctrlY + 18);
      G.fillStyle = '#aab'; G.fillText('Skate around the rink', cx + 180, ctrlY + 18);

      G.fillStyle = '#ffe030'; G.fillText('TAP (right side)', cx, ctrlY + 32);
      G.fillStyle = '#aab'; G.fillText('Shoot / Pass / Steal', cx + 180, ctrlY + 32);

      G.fillStyle = '#ffe030'; G.fillText('DOUBLE TAP', cx, ctrlY + 46);
      G.fillStyle = '#ff6644'; G.fillText('SLAP SHOT! (powerful)', cx + 180, ctrlY + 46);

      G.fillStyle = '#667'; G.textAlign = 'center'; G.font = '8px monospace';
      G.fillText('Skate into opponents to steal the puck', RCX, ctrlY + 62);
    } else {
      G.fillStyle = '#ffe030'; G.fillText('ARROWS / WASD', cx, ctrlY + 18);
      G.fillStyle = '#aab'; G.fillText('Skate around the rink', cx + 180, ctrlY + 18);

      G.fillStyle = '#ffe030'; G.fillText('SPACE + ARROWS', cx, ctrlY + 32);
      G.fillStyle = '#aab'; G.fillText('Shoot puck in that direction', cx + 180, ctrlY + 32);

      G.fillStyle = '#ffe030'; G.fillText('SPACE x2', cx, ctrlY + 46);
      G.fillStyle = '#ff6644'; G.fillText('SLAP SHOT! (powerful)', cx + 180, ctrlY + 46);

      G.fillStyle = '#ffe030'; G.fillText('SPACE (no arrows)', cx, ctrlY + 60);
      G.fillStyle = '#aab'; G.fillText('Pass to nearest teammate', cx + 180, ctrlY + 60);

      G.fillStyle = '#ffe030'; G.fillText('SPACE near opponent', cx, ctrlY + 74);
      G.fillStyle = '#aab'; G.fillText('Body check to steal puck', cx + 180, ctrlY + 74);

      G.fillStyle = '#667'; G.textAlign = 'center'; G.font = '8px monospace';
      G.fillText('Z: Switch player to one nearest puck', RCX, ctrlY + 88);
    }

    // Start prompt
    if (Math.sin(Date.now() * 0.005) > 0) {
      G.fillStyle = '#fff'; G.font = 'bold 18px monospace'; G.textAlign = 'center';
      G.fillText(isMobile ? 'TAP TO START' : 'PRESS SPACE TO START', RCX, 440);
    }

    G.fillStyle = '#889'; G.font = '10px monospace'; G.textAlign = 'center';
    G.fillText('First to ' + WIN_SCORE + ' goals wins!', RCX, 455);

    G.fillStyle = '#667'; G.font = '8px monospace';
    G.fillText('By Azat, Zelime & Zayden', RCX, 472);
  }

  // ═══ WIN SCREEN ═══
  if (state === 'WIN') {
    G.fillStyle = 'rgba(5,5,20,0.85)';
    G.fillRect(0, 0, GW, GH);

    const winner = score[0] >= WIN_SCORE ? 0 : 1;
    G.textAlign = 'center';
    G.fillStyle = winner === 0 ? COL.green : COL.red;
    G.font = 'bold 36px monospace';
    G.fillText(winner === 0 ? 'GREEN DINOS WIN!' : 'RED DINOS WIN!', RCX, 120);

    G.fillStyle = '#fff'; G.font = 'bold 52px monospace';
    G.fillText(score[0] + ' - ' + score[1], RCX, 190);

    drawZelime(RCX, 250, 0.8, 1.5);
    G.fillStyle = '#ffe030'; G.font = 'bold 13px monospace'; G.textAlign = 'center';
    G.fillText('Great game! - Ref Zelime', RCX, 300);

    G.fillStyle = '#ff88cc'; G.font = '12px monospace';
    G.fillText("And happy 50th birthday to our referee!", RCX, 324);

    if (Math.sin(Date.now() * 0.005) > 0) {
      G.fillStyle = '#aaa'; G.font = 'bold 16px monospace';
      G.fillText(isMobile ? 'TAP FOR REMATCH' : 'PRESS SPACE FOR REMATCH', RCX, 380);
    }
  }

  // Scale to display
  dc.drawImage(game, 0, 0, display.width, display.height);

  // CRT scanlines
  dc.fillStyle = 'rgba(0,0,0,0.06)';
  const slH = Math.max(2, Math.round(display.height / GH));
  for (let y = 0; y < display.height; y += slH * 2) {
    dc.fillRect(0, y, display.width, slH);
  }

  if (shakeX > 0.5 || shakeY > 0.5) {
    display.style.transform = 'translate(' + ((Math.random() - 0.5) * shakeX) + 'px,' + ((Math.random() - 0.5) * shakeY) + 'px)';
  } else {
    display.style.transform = '';
  }
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
